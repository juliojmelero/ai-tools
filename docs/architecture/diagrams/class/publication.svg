@startuml
skinparam classAttributeIconSize 0

class Publication {
  +fields: dict
  +add(provider, field_name, value, quality)
  +get(field_name)
  +contributors(field_name)
  +selected_provider(field_name)
  +to_dict()
}

class FieldValue {
  +selected
  +merge_strategy
  +values
  +add(provider, value, quality)
  +contributors()
  +selected_provider()
}

class ProviderValue {
  +provider
  +value
  +timestamp
  +quality
  +to_dict()
}

Publication "1" *- - "many" FieldValue
FieldValue "1" *- - "many" ProviderValue
@enduml

